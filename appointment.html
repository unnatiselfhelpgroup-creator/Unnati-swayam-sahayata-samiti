<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>नियुक्ति आवेदन | उन्नति स्वयं सहायता समिति</title>
</head>
<body>
    <h2>नियुक्ति पत्र आवेदन</h2>
    <form id="appointmentForm" data-collection="Appointments" data-form-label="नियुक्ति आवेदन">
        <input type="text" name="name" placeholder="पूरा नाम" required>
        <input type="text" name="father_name" placeholder="पिता का नाम" required>
        <input type="text" name="mobile" placeholder="मोबाइल" required>
        <input type="text" name="designation" placeholder="पद" required>
        <button type="submit">जमा करें</button>
    </form>
    <script type="module" src="firebase-script.js"></script>
</body>
</html>
